name: Release PersiaPro Theme

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build theme ZIP
        run: |
          cd persiapro
          zip -r ../persiapro.zip . -x "*.DS_Store" -x ".git/*"

      - name: Verify ZIP structure
        run: |
          unzip -l persiapro.zip | head -20
          test -f persiapro.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: persiapro.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
